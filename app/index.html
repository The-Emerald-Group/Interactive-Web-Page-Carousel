<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Page Carousel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; scrollbar-width: none; }
    *::-webkit-scrollbar { display: none; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; cursor: none; }
    iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    #overlay {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #0ff; padding: 8px 18px; border-radius: 20px;
      font-size: 13px; font-family: monospace; z-index: 9999;
      border: 1px solid rgba(0,255,255,0.3); opacity: 0; transition: opacity 0.4s; white-space: nowrap;
    }
    #progress { position: fixed; bottom: 0; left: 0; height: 3px; background: #0ff; z-index: 9999; }
    #fullscreen-btn {
      position: fixed; top: 16px; right: 16px; z-index: 10000;
      background: rgba(0, 0, 0, 0.75); color: #b8ffff; border: 1px solid rgba(0,255,255,0.3);
      border-radius: 8px; padding: 8px 12px; font-family: monospace; cursor: pointer;
    }
  </style>
</head>
<body>
  <iframe id="viewer"></iframe>
  <div id="overlay"></div>
  <div id="progress"></div>
  <button id="fullscreen-btn" type="button">Fullscreen</button>
  <script>
    const viewer = document.getElementById('viewer');
    const overlay = document.getElementById('overlay');
    const progress = document.getElementById('progress');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    let pages = [];
    let intervalMs = 30000;
    let pageTimeoutMs = 15000;
    let currentVersion = 0;
    let current = 0;
    let cycleTimerId = null;
    let pageFailTimerId = null;
    let rafId = null;
    let startTime = null;

    function showOverlay(text, duration = 3000) {
      overlay.textContent = text;
      overlay.style.opacity = '1';
      clearTimeout(overlay._hideTimer);
      overlay._hideTimer = setTimeout(() => overlay.style.opacity = '0', duration);
    }

    function animateProgress() {
      if (rafId) cancelAnimationFrame(rafId);
      function tick() {
        const elapsed = performance.now() - startTime;
        const pct = Math.min((elapsed / intervalMs) * 100, 100);
        progress.style.width = pct + '%';
        if (pct < 100) rafId = requestAnimationFrame(tick);
      }
      rafId = requestAnimationFrame(tick);
    }

    function scheduleFailForward(url) {
      clearTimeout(pageFailTimerId);
      pageFailTimerId = setTimeout(() => {
        if (viewer.src === url) {
          showOverlay('Page timeout, skipping...', 2000);
          advancePage();
        }
      }, pageTimeoutMs);
    }

    function loadCurrentPage() {
      if (!pages.length) {
        progress.style.width = '0%';
        showOverlay('No approved pages configured', 5000);
        return;
      }
      const url = pages[current];
      viewer.src = url;
      scheduleFailForward(url);
      startTime = performance.now();
      animateProgress();
      showOverlay(`${current + 1} / ${pages.length} — ${url}`);
    }

    function advancePage() {
      if (!pages.length) return;
      current = (current + 1) % pages.length;
      loadCurrentPage();
    }

    function startRotation() {
      clearInterval(cycleTimerId);
      loadCurrentPage();
      cycleTimerId = setInterval(() => {
        advancePage();
      }, intervalMs);
    }

    function arraysEqual(a, b) {
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
      return true;
    }

    async function fetchAndApplyConfig(initial = false) {
      try {
        const res = await fetch('/api/public/state', { cache: 'no-store' });
        if (!res.ok) throw new Error('config fetch failed');
        const config = await res.json();
        const nextPages = Array.isArray(config.pages) ? config.pages : [];
        const nextIntervalMs = (parseInt(config.interval, 10) || 30) * 1000;
        pageTimeoutMs = Math.max(5000, Math.floor(nextIntervalMs * 0.5));
        const changed = initial || !arraysEqual(nextPages, pages) || nextIntervalMs !== intervalMs || config.version !== currentVersion;
        if (!changed) return;
        pages = nextPages;
        intervalMs = nextIntervalMs;
        currentVersion = config.version || Date.now();
        if (!pages.length || current >= pages.length) current = 0;
        startRotation();
        if (!initial) showOverlay('Carousel config updated', 2500);
      } catch (err) {
        if (initial) showOverlay('Unable to load config', 5000);
      }
    }

    viewer.addEventListener('load', () => {
      clearTimeout(pageFailTimerId);
    });

    async function tryFullscreen() {
      const el = document.documentElement;
      if (!document.fullscreenElement && el.requestFullscreen) {
        try {
          await el.requestFullscreen();
          fullscreenBtn.style.display = 'none';
        } catch (e) {
          fullscreenBtn.style.display = 'block';
        }
      }
    }

    fullscreenBtn.addEventListener('click', tryFullscreen);
    document.addEventListener('fullscreenchange', () => {
      fullscreenBtn.style.display = document.fullscreenElement ? 'none' : 'block';
    });

    window.addEventListener('focus', () => {
      if (!document.fullscreenElement) {
        fullscreenBtn.style.display = 'block';
      }
    });

    fetchAndApplyConfig(true);
    setInterval(() => fetchAndApplyConfig(false), 5000);
    setTimeout(() => { tryFullscreen(); }, 500);
  </script>
</body>
</html>
