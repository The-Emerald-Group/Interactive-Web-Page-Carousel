name: Build and Push Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: hybrid-carousel
            context: .
            file: ./Dockerfile
            image: ghcr.io/the-emerald-group/interactive-web-page-carousel-hybrid
          - name: page-rotator
            context: ./runner
            file: ./runner/Dockerfile.rotator
            image: ghcr.io/the-emerald-group/interactive-web-page-carousel-rotator
          - name: rotator-control
            context: ./runner
            file: ./runner/Dockerfile.control
            image: ghcr.io/the-emerald-group/interactive-web-page-carousel-control

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
